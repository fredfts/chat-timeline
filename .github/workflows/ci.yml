name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check
          ruff format --check
      - name: Mypy
        run: mypy
      - name: Pytest
        run: pytest -q
      - name: CLI smoke test
        shell: bash
        run: |
          timeline --version
          timeline --help || true
